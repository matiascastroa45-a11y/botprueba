
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot — Menú + Texto Libre</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f7ff;
  --white: #fff;
  --border: #e4e8f4;
  --accent: #4f46e5;
  --accent2: #7c3aed;
  --accent-light: #eef2ff;
  --green: #059669;
  --green-light: #ecfdf5;
  --text: #0f172a;
  --muted: #64748b;
  --light: #94a3b8;
  --shadow: 0 4px 20px rgba(79,70,229,0.1);
  --shadow-lg: 0 12px 40px rgba(79,70,229,0.18);
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 20%, rgba(79,70,229,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
  pointer-events:none;
}
.wrapper { width:100%; max-width:420px; position:relative; z-index:1; }

/* Sheet badge */
.info-bar {
  background:white; border:1px solid var(--border); border-radius:14px;
  padding:12px 16px; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:var(--muted); box-shadow:var(--shadow);
}
.info-bar strong { color:var(--accent); }
.sheet-badge {
  margin-left:auto; display:flex; align-items:center; gap:5px;
  background:var(--green-light); border:1px solid rgba(5,150,105,0.2);
  color:var(--green); font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px;
}
.sheet-badge::before { content:''; width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

/* Chat */
.chat-container {
  background:var(--white); border-radius:24px;
  box-shadow:var(--shadow-lg); overflow:hidden; border:1px solid var(--border);
}

/* Header */
.chat-header {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:16px 20px; display:flex; align-items:center; gap:12px; position:relative; overflow:hidden;
}
.chat-header::before { content:''; position:absolute; top:-30px; right:-30px; width:100px; height:100px; background:rgba(255,255,255,0.07); border-radius:50%; }
.bot-avatar {
  width:42px; height:42px; border-radius:14px;
  background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.35);
  display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;
}
.header-info .bot-name { font-size:15px; font-weight:700; color:white; }
.header-info .bot-status { font-size:11px; color:rgba(255,255,255,0.8); display:flex; align-items:center; gap:5px; margin-top:2px; }
.status-dot { width:6px; height:6px; background:#4ade80; border-radius:50%; }

/* Body */
.chat-body {
  height:430px; overflow-y:auto; padding:16px 14px;
  display:flex; flex-direction:column; gap:10px;
  background:#fafbff; scroll-behavior:smooth;
}
.chat-body::-webkit-scrollbar { width:4px; }
.chat-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Mensajes */
.msg-row { display:flex; flex-direction:column; gap:3px; animation:fadeUp .22s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
.msg-row.bot { align-items:flex-start; }
.msg-row.user { align-items:flex-end; }
.bubble {
  max-width:83%; padding:10px 14px; border-radius:16px;
  font-size:13.5px; line-height:1.55;
}
.bot .bubble {
  background:var(--white); color:var(--text);
  border:1px solid var(--border); border-bottom-left-radius:4px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.user .bubble {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; border-bottom-right-radius:4px;
}
.msg-time { font-size:10px; color:var(--light); font-family:'DM Mono',monospace; padding:0 4px; }

/* Typing */
.typing { display:flex; align-items:center; gap:4px; padding:10px 14px; background:var(--white); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px; width:fit-content; }
.typing span { width:6px; height:6px; background:var(--light); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── MENÚ PRINCIPAL ── */
.menu-card {
  background:var(--white); border:1px solid var(--border);
  border-radius:16px; border-bottom-left-radius:4px;
  overflow:hidden; max-width:88%;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  animation:fadeUp .22s ease;
}
.menu-title {
  padding:11px 14px; font-size:12px; font-weight:700;
  color:var(--muted); border-bottom:1px solid var(--border);
  background:#fafbff; letter-spacing:0.04em;
  display:flex; align-items:center; gap:6px;
}
.menu-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 14px; cursor:pointer;
  border-bottom:1px solid #f1f5f9;
  transition:background .13s; font-size:13.5px; font-weight:500;
  color:var(--text);
}
.menu-item:last-child { border-bottom:none; }
.menu-item:hover { background:var(--accent-light); color:var(--accent); }
.menu-item:hover .menu-arrow { opacity:1; transform:translateX(2px); }
.menu-item-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.menu-item-text { flex:1; }
.menu-item-sub { font-size:11px; color:var(--light); font-weight:400; margin-top:1px; }
.menu-arrow { font-size:12px; color:var(--light); opacity:0; transition:all .13s; }

/* ── BOTONES DE NAVEGACIÓN ── */
.nav-btns {
  display:flex; gap:7px; flex-wrap:wrap; margin-top:2px;
  animation:fadeUp .25s ease;
}
.nav-btn {
  font-size:12px; font-weight:600; font-family:'Plus Jakarta Sans',sans-serif;
  padding:6px 13px; border-radius:20px; cursor:pointer; transition:all .14s;
  border:1.5px solid var(--border); background:var(--white); color:var(--muted);
  display:flex; align-items:center; gap:5px;
}
.nav-btn:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.nav-btn.primary { border-color:var(--accent); color:var(--accent); }
.nav-btn.primary:hover { background:var(--accent); color:white; }

/* ── FORMULARIO TURNO ── */
.turno-form {
  background:var(--white); border:1.5px solid var(--border);
  border-radius:16px; border-bottom-left-radius:4px; padding:16px;
  max-width:90%; animation:fadeUp .25s ease;
}
.turno-form h4 { font-size:13px; font-weight:700; color:var(--text); margin-bottom:12px; }
.form-field { margin-bottom:10px; }
.form-field label { font-size:10px; font-weight:700; color:var(--muted); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:.06em; }
.form-field input, .form-field select {
  width:100%; border:1.5px solid var(--border); border-radius:9px;
  padding:8px 11px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--text); outline:none; transition:border-color .15s; background:#fafbff;
}
.form-field input:focus, .form-field select:focus { border-color:var(--accent); background:white; }
.form-submit {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white; border:none; border-radius:9px; padding:10px;
  font-size:13px; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif;
  cursor:pointer; margin-top:4px; transition:opacity .15s,transform .15s;
}
.form-submit:hover { opacity:.92; transform:translateY(-1px); }

/* Confirm card */
.confirm-card {
  background:var(--green-light); border:1.5px solid rgba(5,150,105,0.25);
  border-radius:14px; padding:14px; max-width:90%; animation:fadeUp .25s ease;
}
.confirm-card h4 { font-size:13px; font-weight:700; color:var(--green); margin-bottom:8px; }
.confirm-detail { font-size:12px; color:#065f46; line-height:1.9; font-family:'DM Mono',monospace; }

/* ── FOOTER INPUT ── */
.chat-footer {
  padding:12px 14px; border-top:1px solid var(--border);
  display:flex; gap:8px; align-items:center; background:var(--white);
}
#userInput {
  flex:1; border:1.5px solid var(--border); border-radius:14px;
  padding:10px 14px; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--text); outline:none; transition:border-color .15s; background:#fafbff;
}
#userInput:focus { border-color:var(--accent); background:white; }
#userInput::placeholder { color:var(--light); }
.send-btn {
  width:40px; height:40px; border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:white; font-size:15px; transition:transform .15s; flex-shrink:0;
}
.send-btn:hover { transform:scale(1.08); }

/* Sheet viewer */
.sheet-viewer { margin-top:14px; background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); }
.sheet-tabs { display:flex; border-bottom:1px solid var(--border); background:#f8fafc; overflow-x:auto; }
.sheet-tab { padding:9px 14px; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:all .15s; }
.sheet-tab.active { color:var(--accent); border-bottom-color:var(--accent); background:white; }
.sheet-content { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#f1f5f9; padding:8px 12px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); border-bottom:1px solid var(--border); }
td { padding:8px 12px; border-bottom:1px solid #f1f5f9; color:var(--text); font-family:'DM Mono',monospace; font-size:11px; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--accent-light); }
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
.badge.pending { background:#fef3c7; color:#92400e; }
.badge.confirmed { background:var(--green-light); color:var(--green); }
</style>
</head>
<body>
<div class="wrapper">

  <div class="info-bar">
    <span>🔗 Respuestas desde <strong>Google Sheets</strong></span>
    <span class="sheet-badge">● Conectado</span>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div class="header-info">
        <div class="bot-name">Asistente Virtual</div>
        <div class="bot-status"><span class="status-dot"></span> En línea · responde al instante</div>
      </div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-footer">
      <input type="text" id="userInput" placeholder="O escribí tu consulta..."
        onkeydown="if(event.key==='Enter') handleFreeText()" />
      <button class="send-btn" onclick="handleFreeText()">➤</button>
    </div>
  </div>

  <div class="sheet-viewer">
    <div class="sheet-tabs">
      <div class="sheet-tab active" onclick="showTab('respuestas',this)">📋 Respuestas Bot</div>
      <div class="sheet-tab" onclick="showTab('turnos',this)">📅 Turnos</div>
    </div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════
// ⚙️ URL DEL APPS SCRIPT — conectado al Google Sheet real
// ═══════════════════════════════════════════
const APPS_SCRIPT_URL = "https://chatbot-turnos-proxy.matiascastroa45.workers.dev";

// ═══════════════════════════════════════════
// DATOS — en producción se leen del Google Sheet con fetch()
// ═══════════════════════════════════════════
const SHEET = {
  keywords: [
    { kw:"hola",       resp:"¡Hola! 👋 ¿En qué te puedo ayudar?" },
    { kw:"gracias",    resp:"¡De nada! 😊 ¿Necesitás algo más?" },
    { kw:"horario",    resp:"Lunes a Viernes 9–18hs · Sábados 9–13hs 🕐" },
    { kw:"precio",     resp:"Corte $X · Tinte $Y · Mechas $Z 💰" },
    { kw:"ubicacion",  resp:"Av. Corrientes 1234, CABA 📍 A media cuadra del subte B." },
    { kw:"pago",       resp:"Aceptamos efectivo, débito y crédito 💳" },
    { kw:"estacion",   resp:"Subte línea B, estación Uruguay 🚇" },
    { kw:"telefono",   resp:"Llamanos al 011-XXXX-XXXX 📞" },
  ],
  turnos: []
};

// ═══════════════════════════════════════════
// ÁRBOL DE MENÚS
// ═══════════════════════════════════════════
const MENUS = {
  main: {
    title: "¿Sobre qué querés consultar?",
    items: [
      { icon:"✂️", label:"Servicios",    sub:"Cortes, tintes, mechas...", next:"servicios" },
      { icon:"📅", label:"Turnos",       sub:"Reservar o consultar turno", next:"turnos" },
      { icon:"💰", label:"Precios",      sub:"Conocé nuestras tarifas", next:"precios" },
      { icon:"📍", label:"Ubicación",    sub:"Cómo llegar", next:"ubicacion" },
      { icon:"💬", label:"Hablar con un asesor", sub:"Abrimos WhatsApp ahora", next:"whatsapp" },
    ]
  },
  servicios: {
    title: "Nuestros servicios",
    items: [
      { icon:"✂️", label:"Corte de cabello", sub:"Desde $X", next:"info_corte" },
      { icon:"🎨", label:"Tinte",            sub:"Desde $Y", next:"info_tinte" },
      { icon:"✨", label:"Mechas",           sub:"Desde $Z", next:"info_mechas" },
      { icon:"🪒", label:"Barba",            sub:"Desde $W", next:"info_barba" },
    ]
  },
  turnos: {
    title: "Turnos",
    items: [
      { icon:"📝", label:"Reservar un turno", sub:"Completá el formulario", next:"form_turno" },
      { icon:"🔍", label:"Consultar mi turno", sub:"Ingresá tu teléfono", next:"info_consultar" },
    ]
  },
  precios: {
    title: "Nuestros precios",
    items: [
      { icon:"✂️", label:"Corte",   sub:"$X", next:"info_corte" },
      { icon:"🎨", label:"Tinte",   sub:"$Y", next:"info_tinte" },
      { icon:"✨", label:"Mechas",  sub:"$Z", next:"info_mechas" },
      { icon:"🪒", label:"Barba",   sub:"$W", next:"info_barba" },
    ]
  },
  ubicacion: {
    title: "Cómo llegar",
    items: [
      { icon:"🗺️",  label:"Ver en Google Maps", sub:"Av. Corrientes 1234", next:"info_maps" },
      { icon:"🚇",  label:"En subte",            sub:"Línea B — Estación Uruguay", next:"info_subte" },
      { icon:"🚗",  label:"En auto",             sub:"Estacionamiento en la cuadra", next:"info_auto" },
    ]
  }
};

// Info de hojas finales (sin submenú)
const INFO = {
  info_corte:     "✂️ <strong>Corte de cabello</strong><br>Desde $X · Duración aprox. 30 min<br>Incluye lavado y secado.",
  info_tinte:     "🎨 <strong>Tinte</strong><br>Desde $Y según largo y técnica.<br>Duración aprox. 60-90 min.",
  info_mechas:    "✨ <strong>Mechas</strong><br>Desde $Z · Varias técnicas disponibles.<br>Duración aprox. 90-120 min.",
  info_barba:     "🪒 <strong>Barba</strong><br>Desde $W · Perfilado y afeitado.<br>Duración aprox. 20 min.",
  info_maps:      "📍 <a href='#' style='color:var(--accent)'>Av. Corrientes 1234, CABA</a><br>A media cuadra del subte B.",
  info_subte:     "🚇 Tomá la <strong>línea B</strong> hasta estación <strong>Uruguay</strong>. Salida por Av. Corrientes, caminá 100m hacia el Este.",
  info_auto:      "🚗 Hay estacionamiento en la cuadra. También podés usar los parquímetros de Av. Corrientes.",
  info_consultar: `
    <div style="background:#f0fdf4;border-radius:10px;padding:12px 14px;border:1px solid rgba(5,150,105,0.2);">
      <div style="font-size:13px;font-weight:700;color:#065f46;margin-bottom:8px;">💬 Consultar mi turno</div>
      <div style="font-size:12px;color:#047857;margin-bottom:12px;line-height:1.5;">
        Escribinos por WhatsApp y te confirmamos el estado de tu turno.
      </div>
      <a href="https://wa.me/5491135140131?text=${encodeURIComponent('Hola! Quiero consultar el estado de mi turno 📅')}"
        target="_blank"
        style="display:block;background:#25d366;color:white;text-align:center;padding:9px;border-radius:9px;font-size:13px;font-weight:700;text-decoration:none;">
        📲 Abrir WhatsApp
      </a>
    </div>`,
};

// ═══════════════════════════════════════════
// ESTADO DE NAVEGACIÓN
// ═══════════════════════════════════════════
let navStack = []; // historial: ["main", "servicios", ...]
let currentScreen = "main";

function isAtMain() { return currentScreen === "main"; }

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function now() {
  return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
}

function scrollBottom() {
  const b = document.getElementById('chatBody');
  setTimeout(()=>{ b.scrollTop = b.scrollHeight; }, 80);
}

function addUserBubble(text) {
  const b = document.getElementById('chatBody');
  const d = document.createElement('div');
  d.className = 'msg-row user';
  d.innerHTML = `<div class="bubble">${text}</div><span class="msg-time">${now()}</span>`;
  b.appendChild(d);
  scrollBottom();
}

function withTyping(delay, fn) {
  const b = document.getElementById('chatBody');
  const t = document.createElement('div');
  t.className = 'msg-row bot'; t.id = 'typing-ind';
  t.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  b.appendChild(t); scrollBottom();
  setTimeout(()=>{ const el = document.getElementById('typing-ind'); if(el) el.remove(); fn(); scrollBottom(); }, delay);
}

// Botones de navegación: "← Atrás" solo si no estamos en main, "🏠 Menú" siempre
function addNavBtns() {
  const b = document.getElementById('chatBody');
  const d = document.createElement('div');
  d.className = 'nav-btns';
  if (!isAtMain()) {
    d.innerHTML += `<button class="nav-btn primary" onclick="goBack()">← Atrás</button>`;
  }
  d.innerHTML += `<button class="nav-btn" onclick="goHome()">🏠 Menú principal</button>`;
  b.appendChild(d);
  scrollBottom();
}

// ═══════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════
function navigate(screen, labelClicked) {
  if (labelClicked) addUserBubble(labelClicked);

  // Guardar en historial
  if (currentScreen !== screen) {
    navStack.push(currentScreen);
    currentScreen = screen;
  }

  withTyping(600, () => {
    // Formulario de turno
    if (screen === 'form_turno') { showTurnoForm(); return; }
    // Asesor
    if (screen === 'whatsapp') { showWhatsApp(); return; }
    // Info final (sin submenú)
    if (INFO[screen]) { showInfo(screen); return; }
    // Submenú
    if (MENUS[screen]) { showMenu(screen); return; }
  });
}

function goBack() {
  if (navStack.length === 0) { goHome(); return; }
  const prev = navStack.pop();
  currentScreen = prev;
  addUserBubble('← Atrás');
  withTyping(400, () => {
    if (MENUS[currentScreen]) showMenu(currentScreen);
    else showInfo(currentScreen);
  });
}

function goHome() {
  navStack = [];
  currentScreen = 'main';
  addUserBubble('🏠 Menú principal');
  withTyping(400, () => showMenu('main'));
}

// ═══════════════════════════════════════════
// RENDERS
// ═══════════════════════════════════════════
function showMenu(screen) {
  const menu = MENUS[screen];
  const b = document.getElementById('chatBody');

  const card = document.createElement('div');
  card.className = 'msg-row bot';

  const menuEl = document.createElement('div');
  menuEl.className = 'menu-card';
  menuEl.innerHTML = `<div class="menu-title">📌 ${menu.title}</div>`;

  menu.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'menu-item';
    el.innerHTML = `
      <span class="menu-item-icon">${item.icon}</span>
      <span class="menu-item-text">
        <div>${item.label}</div>
        ${item.sub ? `<div class="menu-item-sub">${item.sub}</div>` : ''}
      </span>
      <span class="menu-arrow">›</span>`;
    el.onclick = () => navigate(item.next, item.label);
    menuEl.appendChild(el);
  });

  card.appendChild(menuEl);
  const time = document.createElement('span');
  time.className = 'msg-time'; time.textContent = now();
  card.appendChild(time);
  b.appendChild(card);

  // Solo mostrar "Menú principal" si no es el main
  if (screen !== 'main') {
    const nav = document.createElement('div');
    nav.className = 'nav-btns';
    nav.innerHTML = `<button class="nav-btn primary" onclick="goBack()">← Atrás</button>
                     <button class="nav-btn" onclick="goHome()">🏠 Menú principal</button>`;
    b.appendChild(nav);
  }

  scrollBottom();
}

function showInfo(screen) {
  const b = document.getElementById('chatBody');
  const d = document.createElement('div');
  d.className = 'msg-row bot';
  d.innerHTML = `<div class="bubble">${INFO[screen]}</div><span class="msg-time">${now()}</span>`;
  b.appendChild(d);
  addNavBtns();
}

function showWhatsApp() {

function submitTurno() {
  const n = document.getElementById('f_nombre').value.trim();
  const s = document.getElementById('f_servicio').value;
  const f = document.getElementById('f_fecha').value;
  const h = document.getElementById('f_horario').value;
  const t = document.getElementById('f_tel').value.trim();
  if (!n||!s||!f||!h||!t) { alert('Completá todos los campos 👆'); return; }

  // Guardar en Sheet local para el demo visual
  SHEET.turnos.push({ nombre:n, servicio:s, fecha:f, horario:h, tel:t, estado:'Pendiente' });

  // ✅ Enviar al Google Sheet via Cloudflare Worker (sin CORS)
  const params = new URLSearchParams({ nombre:n, servicio:s, fecha:f, horario:h, tel:t, action:"guardar" });
  fetch(APPS_SCRIPT_URL + "?" + params.toString())
    .then(r => r.json())
    .then(data => {
      if (data.ok) console.log("✅ Turno guardado en Sheet");
      else console.error("❌ Error:", data.error);
    })
    .catch(err => console.error("❌ Error de red:", err));

  const b = document.getElementById('chatBody');
  const conf = document.createElement('div');
  conf.className = 'msg-row bot';
  conf.innerHTML = `
    <div class="confirm-card">
      <h4>✅ ¡Turno registrado!</h4>
      <div class="confirm-detail">👤 ${n}<br>✂️ ${s}<br>📅 ${f} · ${h}hs<br>📱 ${t}<br><br>
      <span style="color:var(--green);font-weight:600">Te confirmaremos por WhatsApp ✉️</span></div>
    </div><span class="msg-time">${now()}</span>`;
  b.appendChild(conf);

  const nav = document.createElement('div');
  nav.className = 'nav-btns';
  nav.innerHTML = `<button class="nav-btn" onclick="goHome()">🏠 Menú principal</button>`;
  b.appendChild(nav);

  scrollBottom();
  updateSheet();
  showTab('turnos', document.querySelectorAll('.sheet-tab')[1]);
}

// ═══════════════════════════════════════════
// TEXTO LIBRE — busca en keywords del Sheet
// ═══════════════════════════════════════════
function handleFreeText() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserBubble(text);

  const lower = text.toLowerCase();
  const match = SHEET.keywords.find(k => lower.includes(k.kw));

  withTyping(700, () => {
    const b = document.getElementById('chatBody');
    const d = document.createElement('div');
    d.className = 'msg-row bot';
    if (match) {
      d.innerHTML = `<div class="bubble">${match.resp}</div><span class="msg-time">${now()}</span>`;
    } else {
      d.innerHTML = `<div class="bubble">No encontré esa info 🤔 Navegá el menú o preguntame de otra forma.</div><span class="msg-time">${now()}</span>`;
    }
    b.appendChild(d);
    addNavBtns();
  });
}

// ═══════════════════════════════════════════
// SHEET VIEWER
// ═══════════════════════════════════════════
function showTab(tab, el) {
  document.querySelectorAll('.sheet-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSheet(tab);
}
function renderSheet(tab) {
  const c = document.getElementById('sheetContent');
  if (tab === 'respuestas') {
    c.innerHTML = `<table><thead><tr><th>Palabra clave</th><th>Respuesta</th></tr></thead><tbody>
      ${SHEET.keywords.map(k=>`<tr><td><strong>${k.kw}</strong></td><td>${k.resp.replace(/<[^>]+>/g,'').substring(0,50)}...</td></tr>`).join('')}
    </tbody></table>`;
  } else {
    if (!SHEET.turnos.length) {
      c.innerHTML = `<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;">📅 Todavía no hay turnos.<br>Reservá uno desde el chat 👆</div>`;
    } else {
      c.innerHTML = `<table><thead><tr><th>Nombre</th><th>Servicio</th><th>Fecha</th><th>Hora</th><th>Estado</th></tr></thead><tbody>
        ${SHEET.turnos.map(t=>`<tr><td>${t.nombre}</td><td>${t.servicio}</td><td>${t.fecha}</td><td>${t.horario}</td><td><span class="badge pending">🟡 ${t.estado}</span></td></tr>`).join('')}
      </tbody></table>`;
    }
  }
}
function updateSheet() {
  const active = document.querySelector('.sheet-tab.active');
  renderSheet(active.textContent.includes('Turno') ? 'turnos' : 'respuestas');
}
